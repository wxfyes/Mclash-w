name: MClash Remote Release

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android'
        type: boolean
        required: true
        default: true
      build_windows:
        description: 'Build Windows'
        type: boolean
        required: true
        default: true
      build_macos:
        description: 'Build MacOS'
        type: boolean
        required: true
        default: true
      build_linux:
        description: 'Build Linux'
        type: boolean
        required: true
        default: true
      publish_release:
        description: 'Publish to Public Repo'
        type: boolean
        required: true
        default: true
      branch:
        description: 'Source Branch'
        type: string
        required: true
        default: 'main'

env:
  FLUTTER_VERSION: 'stable'

jobs:
  # =================================================================================================
  # 1. Android Build Job
  # =================================================================================================
  build-android:
    if: ${{ github.event.inputs.build_android }}
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code from wangn9900
        uses: actions/checkout@v4
        with:
          repository: wangn9900/Mclash
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Download Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/mclash.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=mclash.jks" >> android/key.properties

      - name: Setup Android Kernel
        run: |
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          mkdir -p android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p android/app/src/main/jniLibs/x86_64
          curl -L https://github.com/MetaCubeX/mihomo/releases/download/v1.19.24/mihomo-android-arm64-v8-v1.19.24.gz -o assets/mihomo_arm64.gz
          curl -L https://github.com/MetaCubeX/mihomo/releases/download/v1.19.24/mihomo-android-armv7-v1.19.24.gz -o assets/mihomo_armv7.gz
          curl -L https://github.com/MetaCubeX/mihomo/releases/download/v1.19.24/mihomo-android-amd64-v1.19.24.gz -o assets/mihomo_x86_64.gz
          gunzip -c assets/mihomo_arm64.gz > android/app/src/main/jniLibs/arm64-v8a/libmihomo.so
          gunzip -c assets/mihomo_armv7.gz > android/app/src/main/jniLibs/armeabi-v7a/libmihomo.so
          gunzip -c assets/mihomo_x86_64.gz > android/app/src/main/jniLibs/x86_64/libmihomo.so
          rm assets/*.gz

      - name: Build Android APK
        run: flutter build apk --release --split-per-abi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mclash-android-apks
          path: build/app/outputs/flutter-apk/*.apk

  # =================================================================================================
  # 2. Windows Build Job
  # =================================================================================================
  build-windows:
    if: ${{ github.event.inputs.build_windows }}
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code from wangn9900
        uses: actions/checkout@v4
        with:
          repository: wangn9900/Mclash
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Get version from pubspec
        shell: bash
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Setup Windows Assets (Kernel & Rules)
        run: |
          curl.exe -L https://github.com/MetaCubeX/mihomo/releases/download/v1.19.24/mihomo-windows-amd64-v1.19.24.zip -o assets/mihomo_win.zip
          Expand-Archive -Path assets/mihomo_win.zip -DestinationPath assets/temp_win
          Move-Item -Path assets/temp_win/mihomo-windows-amd64.exe -Destination assets/mihomo_TianQue.exe
          Remove-Item -Path assets/mihomo_win.zip, assets/temp_win -Recurse
          curl.exe -L https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat -o assets/geoip.dat
          curl.exe -L https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat -o assets/geosite.dat
          curl.exe -L https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb -o assets/Country.mmdb
        shell: powershell

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath MClash-Windows-x64.zip
          Copy-Item -Path build/windows/x64/runner/Release/*.exe -Destination MClash-Windows-Standalone.exe
        shell: powershell

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mclash-windows-release
          path: |
            MClash-Windows-x64.zip
            MClash-Windows-Standalone.exe

      - name: Create Installer Script
        shell: bash
        run: |
          mkdir -p windows/runner
          cat << 'EOF' > windows/runner/installer.iss
          #define MyAppName "MClash"
          #ifndef MyAppVersion
            #define MyAppVersion "1.0.1"
          #endif
          #define MyAppPublisher "TianQue"
          #define MyAppExeName "mclash.exe"
          #define MyBuildPath "..\..\build\windows\x64\runner\Release"

          [Setup]
          AppId={{E6A1B2C3-D4E5-4F6A-8B9C-0D1E2F3A4B5C}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\{#MyAppName}
          DisableProgramGroupPage=yes
          SetupIconFile=resources\app_icon.ico
          OutputDir=..\..\build\windows\installer
          OutputBaseFilename=MClash_v{#MyAppVersion}_Windows_Setup
          Compression=lzma2/ultra64
          SolidCompression=yes
          WizardStyle=modern

          [Languages]
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Messages]
          english.WelcomeLabel1=欢迎使用 MClash 安装向导
          english.WelcomeLabel2=本程序将在您的电脑上安装 MClash。%n%n建议您在继续之前关闭所有其他应用程序。
          english.WizardSelectDir=选择安装位置
          english.SelectDirDesc=您想将 MClash 安装到哪里？
          english.SelectDirLabel3=安装向导将把 MClash 安装到以下文件夹中。
          english.SelectDirBrowseLabel=点击“下一步”继续。如果您想选择其他文件夹，请点击“浏览”。
          english.DiskSpaceMBLabel=至少需要 [mb] MB 的磁盘空间。
          english.ButtonNext=下一步(&N) >
          english.ButtonBack=< 上一步(&B)
          english.ButtonInstall=安装(&I)
          english.ButtonCancel=取消
          english.WizardReady=准备安装
          english.ReadyLabel1=安装向导现在准备开始在您的电脑上安装 MClash。
          english.ReadyLabel2a=点击“安装”继续安装。
          english.WizardInstalling=正在安装
          english.InstallingLabel=安装向导正在安装 MClash，请稍候。
          english.WizardSetupCompleted=安装完成
          english.FinishedHeadingLabel=MClash 安装向导完成
          english.FinishedLabel=安装向导已在您的电脑上安装了 MClash。您可以点击桌面图标来运行它。
          english.ClickFinish=点击“完成”退出安装向导。
          english.ButtonFinish=完成(&F)
          english.CreateDesktopIcon=创建桌面快捷方式

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

          [Files]
          Source: "{#MyBuildPath}\{#MyAppExeName}"; DestDir: "{app}"; Flags: ignoreversion
          Source: "{#MyBuildPath}\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs; Excludes: "{#MyAppExeName}"

          [Icons]
          Name: "{autoprograms}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"
          Name: "{autodesktop}\{#MyAppName}"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "{cm:LaunchProgram,{#StringChange(MyAppName, '&', '&&')}}"; Flags: nowait postinstall skipifsilent
          EOF

      - name: Build Installer (Inno Setup)
        run: |
          iscc /dMyAppVersion=${{ env.VERSION }} windows/runner/installer.iss
        shell: pwsh

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mclash-windows-installer
          path: build/windows/installer/*.exe

  # =================================================================================================
  # 3. macOS Build Job
  # =================================================================================================
  build-macos:
    if: ${{ github.event.inputs.build_macos }}
    name: Build MacOS
    runs-on: macos-latest
    steps:
      - name: Checkout code from wangn9900
        uses: actions/checkout@v4
        with:
          repository: wangn9900/Mclash
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Get version from pubspec
        shell: bash
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Setup MacOS Assets (Universal Kernel)
        run: |
          mkdir -p assets
          curl -L https://github.com/MetaCubeX/mihomo/releases/download/v1.19.24/mihomo-darwin-amd64-v1.19.24.gz -o assets/mihomo_intel.gz
          curl -L https://github.com/MetaCubeX/mihomo/releases/download/v1.19.24/mihomo-darwin-arm64-v1.19.24.gz -o assets/mihomo_arm.gz
          gunzip assets/mihomo_intel.gz
          gunzip assets/mihomo_arm.gz
          chmod +x assets/mihomo_intel assets/mihomo_arm
          lipo -create assets/mihomo_intel assets/mihomo_arm -output assets/mihomo_TianQue
          rm assets/mihomo_intel assets/mihomo_arm
          curl -L https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat -o assets/geoip.dat
          curl -L https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat -o assets/geosite.dat
          curl -L https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb -o assets/Country.mmdb

      - name: Build MacOS (Universal)
        run: flutter build macos --release

      - name: Package MacOS (ZIP & DMG)
        run: |
          cd build/macos/Build/Products/Release/
          zip -r ../../../../MClash-MacOS-Universal.zip *.app
          cd ../../../../../
          npm install -g appdmg
          APP_NAME=$(ls build/macos/Build/Products/Release/ | grep .app | head -n 1)
          echo "{
            \"title\": \"MClash\",
            \"background\": \"\",
            \"contents\": [
              { \"x\": 448, \"y\": 344, \"type\": \"link\", \"path\": \"/Applications\" },
              { \"x\": 192, \"y\": 344, \"type\": \"file\", \"path\": \"build/macos/Build/Products/Release/$APP_NAME\" }
            ]
          }" > appdmg.json
          appdmg appdmg.json MClash-MacOS-Universal.dmg || echo "DMG creation failed, skipping..."

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mclash-macos-release
          path: |
            MClash-MacOS-Universal.zip
            MClash-MacOS-Universal.dmg
          if-no-files-found: warn

  # =================================================================================================
  # 4. Linux Build Job
  # =================================================================================================
  build-linux:
    if: ${{ github.event.inputs.build_linux }}
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code from wangn9900
        uses: actions/checkout@v4
        with:
          repository: wangn9900/Mclash
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libayatana-appindicator3-dev

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Setup Linux Assets (Kernel & Rules)
        run: |
          mkdir -p assets
          curl -L https://github.com/MetaCubeX/mihomo/releases/download/v1.19.24/mihomo-linux-amd64-v1.19.24.gz -o assets/mihomo_linux.gz
          gunzip assets/mihomo_linux.gz
          mv assets/mihomo_linux assets/mihomo_TianQue
          chmod +x assets/mihomo_TianQue
          curl -L https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat -o assets/geoip.dat
          curl -L https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat -o assets/geosite.dat
          curl -L https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb -o assets/Country.mmdb

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux
        run: |
          cd build/linux/x64/release/bundle
          tar -czvf ../../../../../MClash-Linux-x64.tar.gz *

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mclash-linux-release
          path: MClash-Linux-x64.tar.gz

  # =================================================================================================
  # 5. Release Job
  # =================================================================================================
  release:
    if: ${{ github.event.inputs.publish_release }}
    name: Publish Release to Public Repo
    needs: [build-android, build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code from wangn9900
        uses: actions/checkout@v4
        with:
          repository: wangn9900/Mclash
          ref: ${{ github.event.inputs.branch }}
          token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Extract Version
        id: extract_version
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      - name: Create Release on Public Repo
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          owner: tianquege
          repo: MClash-TianQue
          tag: v${{ steps.extract_version.outputs.VERSION }}
          name: MClash v${{ steps.extract_version.outputs.VERSION }}
          body: |
            Automated Remote Release via wxfyes builder.
          draft: false
          prerelease: false
          allowUpdates: true
          artifacts: |
            release_artifacts/mclash-android-apks/*.apk
            release_artifacts/mclash-windows-release/MClash-Windows-x64.zip
            release_artifacts/mclash-windows-release/MClash-Windows-Standalone.exe
            release_artifacts/mclash-windows-installer/*.exe
            release_artifacts/mclash-macos-release/MClash-MacOS-Universal.zip
            release_artifacts/mclash-macos-release/MClash-MacOS-Universal.dmg
            release_artifacts/mclash-linux-release/MClash-Linux-x64.tar.gz
